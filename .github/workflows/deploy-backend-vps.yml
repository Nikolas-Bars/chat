name: Deploy backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'chat-back/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend-vps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "export APP_DIR='${VPS_APP_DIR:-/opt/chat-backend}' REPO_URL='${REPO_URL}' BRANCH='${BRANCH}'; bash -s" <<'EOF'
          set -euo pipefail
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone "$REPO_URL" "$APP_DIR"
          fi
          cd "$APP_DIR"
          bash "$APP_DIR/deploy/update-and-run.sh"
          EOF
