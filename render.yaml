# Только бэкенд: монорепо, корень сервиса — chat-back (см. rootDir).
# Фронт разворачивай отдельно (другой Web Service / Static / Vercel) и укажи его URL в CORS_ORIGINS и PUBLIC_APP_URL.
#
# Render не даёт MariaDB/MySQL: создай БД снаружи (Railway, Aiven, PlanetScale MySQL, VPS и т.д.),
# затем в Dashboard → Environment задай DB_* и остальные переменные (sync: false ниже).

services:
  - type: web
    name: chat-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: chat-back
    # Иначе при NODE_ENV=production yarn не ставит devDependencies → nest: not found
    buildCommand: yarn install --production=false && yarn build
    preDeployCommand: yarn migration:run:prod
    # Страховка: если preDeploy в Render по какой-то причине не сработал, миграции всё равно применятся.
    startCommand: yarn migration:run:prod && yarn start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # БД (внешняя MySQL/MariaDB-совместимая)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      # Облачный MySQL (Railway): DB_SSL=true; проверка сертификата — только если DB_SSL_REJECT_UNAUTHORIZED=true
      - key: DB_SSL
        sync: false
      # URL фронта (письма подтверждения, CORS)
      - key: PUBLIC_APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Почта: на Render SMTP часто блокируется — лучше Resend (HTTPS)
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_REQUIRE_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
