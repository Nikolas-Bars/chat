# MariaDB + Nest dev (hot reload) для chat-back
services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: chat_db
      MARIADB_USER: chat_user
      MARIADB_PASSWORD: chat_pass
      MARIADB_ROOT_PASSWORD: chat_root_pass
    ports:
      - "3906:3306"
    volumes:
      - chat_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./chat-back
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: chat_user
      DB_PASSWORD: chat_pass
      DB_NAME: chat_db
      PORT: "3000"
      # bind-mount на macOS/Windows: надёжнее подхватывать изменения файлов
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      # Ссылка в письме о подтверждении (фронт Vite по умолчанию)
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:-http://localhost:5173}"
    volumes:
      - ./chat-back:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  chat_mariadb_data:
  backend_node_modules:
